name: Build and Release XPI

on:
  push:
    branches: [main, master]
    paths:
      - manifest.json
      - dist/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version_check.outputs.version_changed }}
      version: ${{ steps.version_check.outputs.version }}
      tag: ${{ steps.version_check.outputs.tag }}
      xpi_path: ${{ steps.version_check.outputs.xpi_path }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect manifest version change
        id: version_check
        shell: bash
        run: |
          VERSION=$(node -p "require('./manifest.json').version")
          BEFORE_SHA="${{ github.event.before }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "${{ github.event_name }}" != "push" ]]; then
            VERSION_CHANGED=false
            PREV_VERSION=""
          elif [[ "$BEFORE_SHA" == "$ZERO_SHA" || -z "$BEFORE_SHA" ]]; then
            VERSION_CHANGED=true
            PREV_VERSION=""
          else
            PREV_VERSION=$(git show "$BEFORE_SHA:manifest.json" 2>/dev/null | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{console.log(JSON.parse(d).version||'')}catch{console.log('')}})")
            if [[ "$PREV_VERSION" != "$VERSION" ]]; then
              VERSION_CHANGED=true
            else
              VERSION_CHANGED=false
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "xpi_path=dist/unga_bunga_user_agent-$VERSION.xpi" >> "$GITHUB_OUTPUT"
          echo "version_changed=$VERSION_CHANGED" >> "$GITHUB_OUTPUT"

          echo "Current version: $VERSION"
          echo "Previous version: ${PREV_VERSION:-<none>}"
          echo "Version changed: $VERSION_CHANGED"

      - name: Build XPI
        if: steps.version_check.outputs.version_changed == 'true'
        shell: bash
        run: |
          mkdir -p dist
          zip -r "${{ steps.version_check.outputs.xpi_path }}" \
            manifest.json \
            agent.js \
            background.js \
            content.js \
            popup.html \
            popup.css \
            popup.js \
            ua-parser.min.js \
            icons \
            inject

      - name: Create or update release
        if: steps.version_check.outputs.version_changed == 'true'
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version_check.outputs.tag }}
          name: Unga Bunga User-Agent v${{ steps.version_check.outputs.version }}
          artifacts: ${{ steps.version_check.outputs.xpi_path }}
          artifactContentType: application/x-xpinstall
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          draft: true
          body: |
            Automated draft release for version ${{ steps.version_check.outputs.version }}.

            Included asset:
            - unga_bunga_user_agent-${{ steps.version_check.outputs.version }}.xpi (unsigned)

            After AMO signing, upload the signed .xpi to this release and publish it.

  upload-signed-to-latest-release:
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed signed XPI files in dist
        id: signed_files
        shell: bash
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"
          ZERO_SHA="0000000000000000000000000000000000000000"

          if [[ "${{ github.event_name }}" != "push" ]]; then
            CHANGED=""
          elif [[ "$BEFORE_SHA" == "$ZERO_SHA" || -z "$BEFORE_SHA" ]]; then
            CHANGED=$(git ls-files "dist/*.xpi")
          else
            CHANGED=$(git diff --name-only "$BEFORE_SHA" "$AFTER_SHA" -- "dist/*.xpi")
          fi

          SIGNED=$(echo "$CHANGED" | grep -Ei 'dist/.*firefox.*\.xpi$' || true)

          {
            echo "files<<EOF"
            echo "$SIGNED"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [[ -n "$SIGNED" ]]; then
            echo "has_signed=true" >> "$GITHUB_OUTPUT"
            echo "Signed files detected:"
            echo "$SIGNED"
          else
            echo "has_signed=false" >> "$GITHUB_OUTPUT"
            echo "No signed files detected in dist/."
          fi

      - name: Resolve latest release tag
        if: steps.signed_files.outputs.has_signed == 'true'
        id: latest_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG=$(gh api "repos/${{ github.repository }}/releases" --jq 'if length == 0 then "" else .[0].tag_name end')
          if [[ -z "$TAG" ]]; then
            echo "No release exists yet. Skipping upload."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "Latest release tag: $TAG"
          fi

      - name: Upload signed XPI files to latest release
        if: steps.signed_files.outputs.has_signed == 'true' && steps.latest_release.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.latest_release.outputs.tag }}"
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            gh release upload "$TAG" "$file" --clobber
            echo "Uploaded $file to release $TAG"
          done <<< "${{ steps.signed_files.outputs.files }}"
